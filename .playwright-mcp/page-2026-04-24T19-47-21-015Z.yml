          - heading "A Little About Me" [level=5] [ref=e60]
          - paragraph [ref=e61]: I've always enjoyed creating. As a child, I made drawings (scribbles?) for anyone who would take them. As time went on, my skill with pencil and paper improved. In high school, I became interested in computer programming, attracted by the ability to create new things with new tools.
          - paragraph [ref=e62]: Over 20 years later, I still get the same satisfaction from building things. I'm drawn to the complexity of full-stack development — the craft of designing interfaces people enjoy using, and the architecture of systems that hold up under real-world pressure. Lately, much of that work has been custom MES/ERP systems, where those old artistic instincts turn out to be surprisingly useful.
          - paragraph [ref=e63]: I take the mentoring side of senior development seriously too. There's something genuinely rewarding about helping a junior developer click with a concept they've been wrestling with.
          - paragraph [ref=e64]: I keep busy and pick up new skills along the way.
          - paragraph [ref=e65]: I still draw from time to time.
